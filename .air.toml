root = "."
testdata_dir = "testdata"
tmp_dir = "bin"

[build]
args_bin = [
  "start",
  "-vv",
  "--sync-interval=30s"
]
bin = "./bin/container-hub"
cmd = 'go build -ldflags "-X github.com/eznix86/docker-registry-ui/internal/version.Version=dev" -o ./bin/container-hub ./cmd/container-hub'
delay = 1000
exclude_dir = [
  "assets",
  "tmp",
  "vendor",
  "node_modules",
  "testdata",
  "resources",
  "public",
  "build",
  "dist"
]
exclude_file = []
exclude_regex = [ "_test.go" ]
exclude_unchanged = false
follow_symlink = false
include_dir = []
include_ext = [ "go" ]
include_file = [ ".env" ]
kill_delay = "0s"
log = "build-errors.log"
send_interrupt = false
stop_on_error = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
time = false

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = false
keep_scroll = true
