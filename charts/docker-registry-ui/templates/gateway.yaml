{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "docker-registry-ui.fullname" . }}
  labels:
    {{- include "docker-registry-ui.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.gateway.create }}
    - name: {{ include "docker-registry-ui.fullname" . }}
      namespace: {{ .Release.Namespace }}
      sectionName: {{ (index .Values.gateway.listeners 0).name }}
    {{- else }}
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
    {{- end }}
  hostnames:
    {{- toYaml .Values.gateway.hostnames | nindent 4 }}
  rules:
    {{- range .Values.gateway.rules }}
    - matches:
        {{- toYaml .matches | nindent 8 }}
      backendRefs:
        {{- range .backendRefs }}
        - name: {{ .name | default (include "docker-registry-ui.fullname" $) }}
          port: {{ .port }}
        {{- end }}
    {{- end }}
{{- end }}
