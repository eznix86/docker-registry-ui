replicaCount: 1

image:
  repository: ghcr.io/eznix86/docker-registry-ui
  pullPolicy: Always
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Deployment update strategy.
# Leave empty to use chart defaults:
# - RollingUpdate when persistence is disabled
# - Recreate when persistence is enabled
#
# Example explicit override:
# strategy:
#   type: RollingUpdate
#   rollingUpdate:
#     maxSurge: 25%
#     maxUnavailable: 25%
strategy: {}

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 3000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: container-hub.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

gateway:
  enabled: false
  # Whether to create the Gateway resource itself.
  # If false, parentRefs must point to an existing Gateway.
  create: false
  # GatewayClass name (e.g. traefik, nginx, cilium).
  className: ""
  annotations: {}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
    # - name: https
    #   protocol: HTTPS
    #   port: 8443
    #   hostname: container-hub.local
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - kind: Secret
    #         name: container-hub-tls
  # Parent Gateway references for the HTTPRoute.
  # When create is true, these are ignored and the route attaches to the chart-created Gateway.
  parentRefs:
    - name: gateway
      namespace: default
      sectionName: http
  hostnames:
    - container-hub.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ""
          port: 3000

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
readinessProbe:
  httpGet:
    path: /healthz
    port: http

# Optional startup probe.
startupProbe: {}
  # httpGet:
  #   path: /healthz
  #   port: http
  # failureThreshold: 30
  # periodSeconds: 10

# Container lifecycle hooks.
lifecycle: {}
  # preStop:
  #   exec:
  #     command: ["/bin/sh", "-c", "sleep 15"]

env:
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "3000"

# Additional environment variables (map of key-value pairs).
extraEnv: {}

# Load env vars from a Kubernetes Secret (optional).
# Leave name empty to disable.
secretEnv:
  name: ""

persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  existingClaim: ""
  accessModes:
    - ReadWriteOnce

# Init container configuration (used when persistence is enabled).
initContainer:
  image:
    repository: busybox
    tag: "1.37"
    pullPolicy: IfNotPresent
  command: ["sh", "-c", "mkdir -p /app/data && chown 65534:65534 /app/data"]

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
